# darwin cross via zig (no Apple SDK on this box). Lives in config so EVERY
# builder (fluxc, cargo, the flux MCP) picks it up without env plumbing.
[target.aarch64-apple-darwin]
linker = "/home/storage/tools/zig/zcc-macos"
ar = "/home/storage/tools/zig/zar"

[env]
CC_aarch64_apple_darwin = "/home/storage/tools/zig/zcc-macos"
AR_aarch64_apple_darwin = "/home/storage/tools/zig/zar"
