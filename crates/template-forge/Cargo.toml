[package]
name = "template-forge"
version.workspace = true
edition.workspace = true
license.workspace = true

# Auto-propose project templates — each ~50 features + dedicated SIGIL build
# tasks — seeded from wickes-cms, sigil-spawn, and novel "beyond" domains.
# Emits a catalog the template-picker UI consumes. std + serde only.
[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }

[lib]
path = "src/lib.rs"

[[bin]]
name = "template-forge"
path = "src/bin/template-forge.rs"
