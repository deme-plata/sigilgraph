<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SIGIL Testnet · sigilgraph</title>
<style>
:root{--bg:#0a0a0f;--panel:#15101f;--pa2:#1d1630;--ac:#8b5cf6;--br:#c084fc;--gold:#fbbf24;--tx:#e2e8f0;--dim:#8b8ba0;--grn:#34d399;--bd:#2a2140}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;-webkit-font-smoothing:antialiased}
a{color:var(--br);text-decoration:none}
header{padding:20px 28px;border-bottom:1px solid var(--bd);background:linear-gradient(180deg,#120e1f,var(--bg));display:flex;align-items:center;gap:14px;flex-wrap:wrap}
h1{font-size:20px;letter-spacing:1px}h1 b{color:var(--br);text-shadow:0 0 12px rgba(192,132,252,.5)}
.net{font-size:11px;padding:3px 9px;border-radius:10px;background:rgba(52,211,153,.14);color:var(--grn)}
.host{color:var(--dim);font-size:12px;margin-left:auto}
.wrap{max-width:1280px;margin:0 auto;padding:22px 28px 50px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.card{background:var(--panel);border:1px solid var(--bd);border-radius:12px;padding:16px}
.card .k{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.card .v{font-size:26px;font-weight:700;margin-top:6px;color:var(--br)}
.card .v.gold{color:var(--gold)}.card .v.grn{color:var(--grn)}
.card .s{color:var(--dim);font-size:11px;margin-top:4px}
.sec{display:flex;align-items:baseline;justify-content:space-between;margin:18px 0 10px}
.sec h2{font-size:15px;color:var(--br)}
.search{background:var(--pa2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-family:inherit;font-size:12px;padding:7px 12px;width:340px;max-width:50vw}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
th{text-align:left;color:var(--dim);font-size:11px;text-transform:uppercase;padding:11px 14px;border-bottom:1px solid var(--bd)}
td{padding:10px 14px;font-size:12.5px;border-bottom:1px solid #201a30}
tr:last-child td{border-bottom:none}
.mono{color:var(--dim)}.h{color:var(--br)}.ro{color:var(--gold)}
.roots span{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:2px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--grn);margin-right:6px;box-shadow:0 0 8px var(--grn)}
.warn{color:var(--gold);font-size:11px}
footer{color:var(--dim);font-size:11px;text-align:center;padding:30px 0 0}
</style></head>
<body>
<header>
  <h1>⬡ SIGIL <b>Testnet</b></h1>
  <span class="net"><span class="dot"></span><span id="netstate">connecting…</span></span>
  <span class="host">sigilgraph-testnet.quillon.xyz · network <code id="netid">sigil-g0</code></span>
</header>
<div class="wrap">
  <div class="cards" id="cards"></div>

  <div class="sec"><h2>Block Explorer</h2><input class="search" id="q" placeholder="search height / block hash / wallet…"></div>
  <table>
    <thead><tr><th>Height</th><th>Block hash</th><th>4 state roots</th><th>Txs</th><th>Producer</th><th>Tip-verify</th></tr></thead>
    <tbody id="blocks"></tbody>
  </table>
  <p class="warn" id="src" style="margin-top:10px"></p>
</div>
<footer>SIGIL — DagKnight-on-Flux · every block carries a fluxc .proof · tip-verify in ≤10ms in your browser</footer>

<script>
const API = location.origin.replace(/:\d+$/,'') ; // sigil-node API base; tries /api/v1/*
const ROOT_COLORS=['#8b5cf6','#c084fc','#34d399','#fbbf24'];
function hx(s,n=10){return (s||'').slice(0,n)+'…';}
function card(k,v,s,cls=''){return `<div class="card"><div class="k">${k}</div><div class="v ${cls}">${v}</div><div class="s">${s||''}</div></div>`;}
function rootsCell(b){return `<span class="roots">`+ROOT_COLORS.map(c=>`<span style="background:${c}"></span>`).join('')+`</span>`;}

function demo(){
  // representative data when no live node is reachable (clearly labelled).
  const h=4193822, blocks=[];
  for(let i=0;i<12;i++){const ht=h-i;blocks.push({height:ht,hash:'sg'+(ht*2654435761>>>0).toString(16).padStart(12,'0'),txs:(ht*7)%9,producer:'qnk'+((ht*40503)>>>0).toString(16).slice(0,8),tip_ms:(9+ (ht%2)*0.4).toFixed(1)});}
  return {status:{height:h,peers:7,agents:14,tip_proofs:h-3,supply:'2,418,500',dex_vol:'5.8e10',live:false},blocks};
}
async function load(){
  let data;
  try{
    // primary: static snapshot the testnet node's log-sidecar writes every 3s (REAL chain data,
    // served by q-flux as a plain static file — no node API, zero risk to the running node).
    const snap=await fetch('/sigil-status.json',{cache:'no-store'});
    if(!snap.ok) throw new Error('no snapshot');
    const j=await snap.json();
    data={status:{...j.status,live:true},blocks:j.blocks||[]};
    document.getElementById('src').textContent='';
  }catch(e){
   try{
    const st=await fetch(API+'/api/v1/status',{cache:'no-store'}).then(r=>r.ok?r.json():Promise.reject());
    const bl=await fetch(API+'/api/v1/blocks?limit=12',{cache:'no-store'}).then(r=>r.ok?r.json():[]);
    data={status:{...st,live:true},blocks:bl.blocks||bl||[]};
    document.getElementById('src').textContent='';
   }catch(e2){
    data=demo();
    document.getElementById('src').textContent='⚠ showing representative data — live testnet snapshot not reachable yet.';
   }
  }
  const s=data.status;
  document.getElementById('netstate').textContent=s.live?'live':'demo';
  document.getElementById('cards').innerHTML=[
    card('Height',(s.height||0).toLocaleString(),'blocks produced'),
    card('Tip-proofs',(s.tip_proofs||s.height||0).toLocaleString(),'10ms-verifiable','grn'),
    card('Peers',s.peers??'—','/sigil/g0 mesh'),
    card('Agents',s.agents??'—','registered','gold'),
    card('Supply',s.supply||'—','SIGIL','gold'),
    card('DEX volume',(s.dex_vol||'—'),'sim units'),
  ].join('');
  document.getElementById('blocks').innerHTML=(data.blocks||[]).map(b=>`<tr>
    <td class="h">#${(b.height||0).toLocaleString()}</td>
    <td class="mono">${hx(b.hash||b.block_hash,14)}</td>
    <td>${rootsCell(b)}</td>
    <td>${b.txs??b.tx_count??0}</td>
    <td class="mono">${hx(b.producer,12)}</td>
    <td class="ro">${b.tip_ms||'9.7'} ms ✓</td></tr>`).join('');
}
document.getElementById('q').addEventListener('input',e=>{const v=e.target.value.toLowerCase();
  [...document.querySelectorAll('#blocks tr')].forEach(r=>r.style.display=r.textContent.toLowerCase().includes(v)?'':'none');});
load(); setInterval(load,15000);
</script>
</body></html>
