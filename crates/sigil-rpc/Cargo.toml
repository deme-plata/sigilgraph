[package]
name = "sigil-rpc"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "SIGIL node RPC core — chokepoint-respecting swap (exchange of money) + mining-reward submission over sigil-state + sigil-dex. The keystone both AGORA-exchange and mining depend on. FLUXFOOD-light."

[dependencies]
serde      = { workspace = true }
serde_json = { workspace = true }
blake3     = { workspace = true }
thiserror  = { workspace = true }

sigil-state = { path = "../sigil-state" }
sigil-dex   = { path = "../sigil-dex" }
sigil-bank  = { path = "../sigil-bank" }
sigil-oauth = { path = "../sigil-oauth" }

# Dual-lane mining gate for the sigil-rpcd /api/v1/mining/{challenge,submit}
# endpoints. default-features = false keeps the keystone reqwest/market-free —
# we use ONLY the verification core (Challenge/Submission/check_submission).
flux-vdf   = { workspace = true }
flux-miner = { path = "../flux-miner", default-features = false }
