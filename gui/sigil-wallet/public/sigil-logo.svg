<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- SIGIL placeholder logo · 0.1.6 · final logo in Phase B 0.2.0 -->
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="60%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#1a1428" />
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="110" fill="url(#g)" />
  <!-- The sigil: nested hex + center mark -->
  <g fill="none" stroke="#fbbf24" stroke-width="2.5" filter="url(#glow)">
    <polygon points="128,40 200,82 200,174 128,216 56,174 56,82" opacity="0.85" />
    <polygon points="128,72 172,98 172,158 128,184 84,158 84,98" opacity="0.55" />
    <circle cx="128" cy="128" r="14" />
    <line x1="128" y1="40" x2="128" y2="114" />
    <line x1="128" y1="142" x2="128" y2="216" />
  </g>
</svg>
