name: macos-release
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "commit to build (the release-version commit)"
        required: true
      tag:
        description: "existing release tag to upload to"
        required: true
        default: "v0.70.0"
permissions:
  contents: write
jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: build
        run: |
          rustup target add aarch64-apple-darwin
          cargo build --release -p sigil-top --target aarch64-apple-darwin
      - name: smoke test (real Apple silicon)
        run: |
          BIN=target/aarch64-apple-darwin/release/sigil-top
          $BIN --selfcheck
          cp $BIN sigil-top-macos-arm64
      - name: upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.inputs.tag }}" sigil-top-macos-arm64 --clobber
